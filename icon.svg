<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63b3ed"/>
      <stop offset="100%" style="stop-color:#9f7aea"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80"  cy="80"  r="2.5" fill="#63b3ed" opacity="0.6"/>
  <circle cx="430" cy="60"  r="2"   fill="#9f7aea" opacity="0.5"/>
  <circle cx="460" cy="200" r="1.5" fill="#63b3ed" opacity="0.4"/>
  <circle cx="50"  cy="400" r="2"   fill="#9f7aea" opacity="0.5"/>
  <circle cx="400" cy="440" r="2.5" fill="#63b3ed" opacity="0.4"/>
  <circle cx="120" cy="460" r="1.5" fill="#9f7aea" opacity="0.6"/>
  <circle cx="490" cy="350" r="2"   fill="#63b3ed" opacity="0.3"/>
  <!-- Outer orbit ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.3"/>
  <!-- Inner orbit ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.15"/>
  <!-- Hand shape -->
  <!-- Palm -->
  <rect x="186" y="260" width="142" height="110" rx="24" fill="url(#g1)" opacity="0.95"/>
  <!-- Thumb -->
  <rect x="148" y="280" width="52" height="30" rx="15" fill="url(#g1)" opacity="0.95"/>
  <!-- Index finger -->
  <rect x="200" y="148" width="36" height="120" rx="18" fill="url(#g1)" opacity="0.95"/>
  <!-- Middle finger -->
  <rect x="244" y="132" width="36" height="136" rx="18" fill="url(#g1)" opacity="0.95"/>
  <!-- Ring finger -->
  <rect x="288" y="148" width="36" height="120" rx="18" fill="url(#g1)" opacity="0.95"/>
  <!-- Pinky -->
  <rect x="328" y="172" width="30" height="96"  rx="15" fill="url(#g1)" opacity="0.95"/>
  <!-- Glow dot on index tip -->
  <circle cx="218" cy="140" r="10" fill="#63b3ed" opacity="0.7"/>
  <!-- COSMOS text -->
  <text x="256" y="416" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="8" fill="url(#g1)">COSMOS</text>
</svg>
